name: SAST Security Scan

on:
  schedule:
    - cron: '0 6 * * 0'  # Weekly on Sunday at 6 AM
  workflow_dispatch:  # Allow manual trigger

jobs:
  sast-scan:
    name: Run SAST Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
      actions: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          config-file: ./.github/codeql-config.yml
        env:
          CODEQL_RAM: 4096
          CODEQL_THREADS: 4
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-python
          output: sarif-results
          upload: false
      
      - name: Locate and rename SARIF file
        run: |
          mkdir -p results_files/sasts
          BRANCH_NAME="${{ github.ref_name }}"
          # Remove existing SARIF file if it exists
          rm -f results_files/sasts/${BRANCH_NAME}.sarif
          find sarif-results -name "*.sarif" -exec cp {} results_files/sasts/${BRANCH_NAME}.sarif \;
          ls -la results_files/sasts/
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run Pylint
        continue-on-error: true
        run: |
          mkdir -p results_files/pylint
          BRANCH_NAME="${{ github.ref_name }}"
          # Remove existing pylint file if it exists
          rm -f results_files/pylint/${BRANCH_NAME}_lint.json
          # Run pylint and extract just the score
          pylint vulnerable_app.py > pylint_output.txt 2>&1 || true
          SCORE=$(grep -oP 'rated at \K[0-9.]+(?=/10)' pylint_output.txt || echo "N/A")
          echo "{\"score\": \"$SCORE/10\"}" > results_files/pylint/${BRANCH_NAME}_lint.json
          echo "Pylint analysis complete - Score: $SCORE/10"
      
      - name: Run Pytest
        continue-on-error: true
        run: |
          mkdir -p results_files/pytest
          BRANCH_NAME="${{ github.ref_name }}"
          # Remove existing pytest file if it exists
          rm -f results_files/pytest/${BRANCH_NAME}_pytest.json
          # Run pytest and capture summary
          pytest -v > pytest_output.txt 2>&1 || true
          PASSED=$(grep -oP '\K[0-9]+(?= passed)' pytest_output.txt || echo "0")
          FAILED=$(grep -oP '\K[0-9]+(?= failed)' pytest_output.txt || echo "0")
          echo "{\"passed\": $PASSED, \"failed\": $FAILED}" > results_files/pytest/${BRANCH_NAME}_pytest.json
          echo "Pytest analysis complete - Passed: $PASSED, Failed: $FAILED"
      
      - name: Commit results to branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add results_files/
          git commit -m "Add SAST, Pylint, and Pytest results [skip ci]" || echo "No changes to commit"
          git push || echo "Nothing to push"
      
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: results_files/sasts/${{ github.ref_name }}.sarif
          category: codeql
      
      - name: Create scan summary
        if: always()
        run: |
          echo "## SAST Scan Complete 🔍" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tool:** CodeQL (Python security analysis)" >> $GITHUB_STEP_SUMMARY
          echo "**Results committed to branch:**" >> $GITHUB_STEP_SUMMARY
          echo "- results_files/sasts/${{ github.ref_name }}.sarif" >> $GITHUB_STEP_SUMMARY
          echo "- results_files/pylint/${{ github.ref_name }}_lint.json" >> $GITHUB_STEP_SUMMARY
          echo "- results_files/pytest/${{ github.ref_name }}_pytest.json" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY